<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Savanna Hotel | Booking</title>
  <!-- Google Fonts for clean typography + Poppins vibe -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #f9f3e5 0%, #f0e2cf 100%);
      font-family: 'Inter', sans-serif;
      padding: 2rem 1.5rem;
      color: #2c2418;
    }

    .booking-container {
      max-width: 1100px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 32px;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .hotel-hero {
      position: relative;
      background-image: url('https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg?auto=compress&cs=tinysrgb&w=1600&h=600&fit=crop');
      background-size: cover;
      background-position: center 30%;
      height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-overlay {
      background: linear-gradient(135deg, rgba(0,0,0,0.45), rgba(0,0,0,0.3));
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      backdrop-filter: brightness(0.96);
    }

    .hotel-name {
      font-size: 3.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #FFF6E8;
      text-shadow: 0 4px 18px rgba(0,0,0,0.5);
      margin-bottom: 0.5rem;
    }

    .slogan {
      font-size: 1.2rem;
      font-weight: 500;
      color: #FFF2E0;
      background: rgba(91, 55, 30, 0.55);
      backdrop-filter: blur(4px);
      padding: 0.4rem 1.2rem;
      border-radius: 60px;
      letter-spacing: 0.3px;
    }

    .slogan i {
      margin: 0 6px;
      font-size: 0.9rem;
    }

    .booking-form {
      padding: 2rem 2.2rem 2.6rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.8rem 2rem;
    }

    .full-width {
      grid-column: span 2;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-field label {
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a06e42;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-field label i {
      font-size: 0.9rem;
      width: 20px;
      color: #c5823e;
    }

    input, select, textarea {
      font-family: 'Inter', sans-serif;
      border: 1px solid #e2d4c6;
      background-color: #fefaf5;
      border-radius: 18px;
      padding: 0.8rem 1.2rem;
      font-size: 0.95rem;
      transition: all 0.2s;
      outline: none;
      color: #2c2418;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #d9a066;
      box-shadow: 0 0 0 3px rgba(217, 160, 102, 0.2);
      background-color: #ffffff;
    }

    .name-row {
      display: flex;
      gap: 1rem;
      width: 100%;
    }

    .name-row .form-field {
      flex: 1;
    }

    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      align-items: center;
      background: #fefaf5;
      padding: 0.5rem 0.8rem;
      border-radius: 28px;
      border: 1px solid #e2d4c6;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .radio-option input {
      width: 18px;
      height: 18px;
      accent-color: #c5823e;
      margin: 0;
      transform: scale(1);
    }

    .submit-btn {
      background: #b46f3c;
      border: none;
      padding: 1rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: white;
      border-radius: 44px;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      letter-spacing: 0.5px;
      margin-top: 0.5rem;
      box-shadow: 0 6px 14px rgba(163, 94, 39, 0.25);
    }

    .submit-btn:hover {
      background: #9b5c2e;
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(128, 73, 32, 0.25);
    }

    .hint {
      font-size: 0.7rem;
      color: #a98462;
      margin-top: 4px;
    }

    textarea {
      resize: vertical;
      min-height: 85px;
    }

    .date-time-row {
      display: flex;
      gap: 1rem;
    }

    .date-time-row .form-field {
      flex: 1;
    }

    @media (max-width: 780px) {
      .form-grid {
        grid-template-columns: 1fr;
        gap: 1.4rem;
      }
      .full-width {
        grid-column: span 1;
      }
      .booking-form {
        padding: 1.6rem;
      }
      .hotel-name {
        font-size: 2.2rem;
      }
      .name-row {
        flex-direction: column;
        gap: 0.8rem;
      }
      .date-time-row {
        flex-direction: column;
        gap: 0.8rem;
      }
    }

    ::placeholder {
      color: #bc9a79;
      opacity: 0.7;
      font-weight: 400;
    }

    footer {
      background: #fbf5ec;
      text-align: center;
      padding: 1rem;
      font-size: 0.75rem;
      color: #8b694a;
      border-top: 1px solid #efe2d4;
    }

    .success-message, .error-message {
      padding: 1rem;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      display: none;
    }

    .success-message {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .error-message {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .success-message.show, .error-message.show {
      display: block;
    }
  </style>
</head>
<body>
<div class="booking-container">
  <div class="hotel-hero">
    <div class="hero-overlay">
      <div class="hotel-name">Savanna Hotel</div>
      <div class="slogan">
        <i class="fas fa-leaf"></i> Your happiness and peace __ Our concern <i class="fas fa-dove"></i>
      </div>
    </div>
  </div>

  <div class="booking-form">
    <div id="successMessage" class="success-message"></div>
    <div id="errorMessage" class="error-message"></div>
    
    <form id="bookingForm">
      <div class="form-grid">
        <div class="form-field full-width">
          <label><i class="fas fa-user"></i> Name</label>
          <input type="text" id="fullName" name="fullName" placeholder="Your full name" required>
        </div>

        <div class="form-field full-width">
          <label><i class="fas fa-envelope"></i> E-mail</label>
          <input type="email" id="email" name="email" placeholder="myname@example.com" required>
        </div>

        <div class="name-row full-width">
          <div class="form-field">
            <label><i class="fas fa-user-pen"></i> First Name</label>
            <input type="text" id="firstName" name="firstName" placeholder="First name">
          </div>
          <div class="form-field">
            <label><i class="fas fa-user-tag"></i> Last Name</label>
            <input type="text" id="lastName" name="lastName" placeholder="Last name">
          </div>
        </div>

        <div class="form-field">
          <label><i class="fas fa-bed"></i> Room Type</label>
          <select id="roomType" name="roomType">
            <option value="" disabled selected>Please Select</option>
            <option value="Savanna Suite">Savanna Suite — King bed + Safari view</option>
            <option value="Deluxe Twin">Deluxe Twin — 2 Queen beds, garden view</option>
            <option value="Standard Room">Standard Room — Cozy elegance</option>
            <option value="Family Villa">Family Villa — Private terrace & plunge pool</option>
          </select>
        </div>

        <div class="form-field">
          <label><i class="fas fa-users"></i> Number of Guests</label>
          <input type="number" id="guests" name="guests" placeholder="e.g., 2, 3, 4" min="1" max="20">
          <div class="hint">Adults + children</div>
        </div>

        <div class="date-time-row full-width">
          <div class="form-field">
            <label><i class="fas fa-calendar-alt"></i> Arrival Date & Time</label>
            <input type="datetime-local" id="arrivalDateTime" name="arrivalDateTime">
          </div>
          <div class="form-field">
            <label><i class="fas fa-calendar-check"></i> Departure Date</label>
            <input type="date" id="departureDate" name="departureDate">
          </div>
        </div>

        <div class="form-field full-width">
          <label><i class="fas fa-shuttle-van"></i> Free Pickup?</label>
          <div class="radio-group" id="pickupGroup">
            <label class="radio-option">
              <input type="radio" name="pickup" value="yes" checked> Yes Please! - Pick me up on arrival
            </label>
            <label class="radio-option">
              <input type="radio" name="pickup" value="no"> No Thanks - I'll make my own way there
            </label>
          </div>
        </div>

        <div class="form-field full-width" id="flightField">
          <label><i class="fas fa-plane"></i> Flight Number</label>
          <input type="text" id="flightNumber" name="flightNumber" placeholder="e.g., SA 242, AA 1234">
          <div class="hint">Only required if pickup requested (optional)</div>
        </div>

        <div class="form-field full-width">
          <label><i class="fas fa-pen-fancy"></i> Special Requests</label>
          <textarea id="specialRequests" name="specialRequests" placeholder="Dietary needs, extra pillows, early check-in, etc."></textarea>
        </div>

        <div class="full-width">
          <button type="submit" class="submit-btn"><i class="fas fa-check-circle"></i> Submit Booking</button>
        </div>
      </div>
    </form>
  </div>
  <footer>
    <i class="fas fa-tree"></i> Savanna Hotel — serenity & wild elegance 
  </footer>
</div>

<script>
  (function() {
    const form = document.getElementById('bookingForm');
    const successDiv = document.getElementById('successMessage');
    const errorDiv = document.getElementById('errorMessage');
    const pickupRadios = document.querySelectorAll('input[name="pickup"]');
    const flightInput = document.getElementById('flightNumber');
    const arrivalInput = document.getElementById('arrivalDateTime');
    const departInput = document.getElementById('departureDate');
    
    // Set default date values
    const today = new Date();
    const defaultArrival = new Date(today);
    defaultArrival.setDate(today.getDate() + 7);
    const defaultDeparture = new Date(defaultArrival);
    defaultDeparture.setDate(defaultArrival.getDate() + 3);
    
    arrivalInput.value = defaultArrival.toISOString().slice(0, 16);
    departInput.value = defaultDeparture.toISOString().slice(0, 10);
    
    function hideMessages() {
      successDiv.classList.remove('show');
      errorDiv.classList.remove('show');
      successDiv.innerHTML = '';
      errorDiv.innerHTML = '';
    }
    
    function showSuccess(message) {
      successDiv.innerHTML = message;
      successDiv.classList.add('show');
      setTimeout(() => {
        successDiv.classList.remove('show');
      }, 5000);
    }
    
    function showError(message) {
      errorDiv.innerHTML = message;
      errorDiv.classList.add('show');
    }
    
    function updateFlightRequirement() {
      const selectedPickup = document.querySelector('input[name="pickup"]:checked');
      if (selectedPickup && selectedPickup.value === 'yes') {
        flightInput.placeholder = "Flight number required for pickup";
        flightInput.setAttribute('data-required', 'true');
      } else {
        flightInput.placeholder = "e.g., SA 242, AA 1234";
        flightInput.removeAttribute('data-required');
      }
    }
    
    function updateDepartureMin() {
      if (arrivalInput.value) {
        const arrivalDateOnly = arrivalInput.value.split('T')[0];
        departInput.min = arrivalDateOnly;
        if (departInput.value && departInput.value < arrivalDateOnly) {
          departInput.value = arrivalDateOnly;
        }
      } else {
        departInput.min = '';
      }
    }
    
    pickupRadios.forEach(radio => radio.addEventListener('change', () => {
      updateFlightRequirement();
      hideMessages();
    }));
    
    arrivalInput.addEventListener('change', () => {
      updateDepartureMin();
      hideMessages();
    });
    
    departInput.addEventListener('change', () => hideMessages());
    
    updateFlightRequirement();
    updateDepartureMin();
    
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      hideMessages();
      
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const roomTypeSelect = document.getElementById('roomType');
      const roomType = roomTypeSelect.value;
      const guests = document.getElementById('guests').value;
      const arrivalDateTime = arrivalInput.value;
      const departureDate = departInput.value;
      const pickupSelected = document.querySelector('input[name="pickup"]:checked');
      const pickupValue = pickupSelected ? pickupSelected.value : '';
      const flightNumber = flightInput.value.trim();
      const specialRequests = document.getElementById('specialRequests').value.trim();
      
      const errors = [];
      
      if (!fullName) errors.push("Full Name is required");
      if (!email) errors.push("Email address is required");
      else if (!/^\S+@\S+\.\S+$/.test(email)) errors.push("Please enter a valid email (e.g., name@example.com)");
      if (!roomType || roomType === "") errors.push("Please select a Room Type");
      if (pickupValue === 'yes' && !flightNumber) {
        errors.push("Flight Number is required when Free Pickup is selected");
      }
      if (arrivalDateTime && departureDate) {
        const arrivalDateObj = new Date(arrivalDateTime);
        const departDateObj = new Date(departureDate);
        if (departDateObj <= arrivalDateObj) {
          errors.push("Departure date must be after arrival date");
        }
      }
      
      if (errors.length > 0) {
        showError("Please fix the following:\n" + errors.join("\n"));
        return;
      }
      
      const pickupText = pickupValue === 'yes' ? "Yes, pick me up" : "No pickup needed";
      const roomLabel = roomTypeSelect.options[roomTypeSelect.selectedIndex]?.text || roomType;
      
      const confirmationHtml = `
        <strong>Booking Confirmed!</strong><br><br>
        <strong>Guest:</strong> ${escapeHtml(fullName)} (${escapeHtml(firstName)} ${escapeHtml(lastName)})<br>
        <strong>Email:</strong> ${escapeHtml(email)}<br>
        <strong>Room:</strong> ${escapeHtml(roomLabel)}<br>
        <strong>Guests:</strong> ${escapeHtml(guests || 'Not specified')}<br>
        <strong>Arrival:</strong> ${escapeHtml(arrivalDateTime ? arrivalDateTime.replace('T', ' at ') : 'Not set')}<br>
        <strong>Departure:</strong> ${escapeHtml(departureDate || 'Not set')}<br>
        <strong>Pickup service:</strong> ${escapeHtml(pickupText)}<br>
        ${flightNumber ? `<strong>Flight:</strong> ${escapeHtml(flightNumber)}<br>` : ''}
        ${specialRequests ? `<strong>Requests:</strong> ${escapeHtml(specialRequests)}<br>` : ''}
        <br><em>Thank you for choosing Savanna Hotel! Your happiness and peace — our concern.</em>
      `;
      
      showSuccess(confirmationHtml);
      
      console.log("Booking submitted:", {
        fullName, email, firstName, lastName, roomType, guests, arrivalDateTime, departureDate, pickupValue, flightNumber, specialRequests
      });
      
      form.reset();
      document.getElementById('fullName').value = '';
      document.getElementById('email').value = '';
      document.getElementById('firstName').value = '';
      document.getElementById('lastName').value = '';
      document.getElementById('guests').value = '';
      document.getElementById('specialRequests').value = '';
      flightInput.value = '';
      
      roomTypeSelect.value = '';
      document.querySelector('input[name="pickup"][value="yes"]').checked = true;
      
      arrivalInput.value = defaultArrival.toISOString().slice(0, 16);
      departInput.value = defaultDeparture.toISOString().slice(0, 10);
      
      updateFlightRequirement();
      updateDepartureMin();
    });
    
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
    
    const guestsField = document.getElementById('guests');
    if (guestsField) {
      guestsField.placeholder = "e.g., 2 adults, 1 child";
    }
  })();
</script>
</body>
</html>
